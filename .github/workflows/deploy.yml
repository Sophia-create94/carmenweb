name: Deploy to All-Inkl (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual runs from the Actions tab

# Avoid overlapping deploys if you push twice quickly.
concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Exposed so the deploy step can be skipped until secrets are configured.
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (-> ./out)
        run: npm run build

      - name: Deploy to All-Inkl via FTPS
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          # Web root on All-Inkl. The main FTP account lands at "/", and the
          # site lives in "/drcarmenmueller.de/". Override via the repo variable
          # FTP_SERVER_DIR (must end with "/") if you use a directory-scoped
          # FTP user whose home is already the web root.
          server-dir: ${{ vars.FTP_SERVER_DIR || '/drcarmenmueller.de/' }}
          # SAFETY: never enable `dangerous-clean-slate` here. The web root also
          # contains server-managed folders (admin/, config/, webmail/) that must
          # NOT be deleted. This action only ever touches files it uploaded, so
          # those folders are left untouched as long as clean-slate stays off.
          # Files on the server to never touch (state file is managed by the action).
          exclude: |
            **/.git*
            **/.git*/**
